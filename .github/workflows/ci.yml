name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: lint + typecheck + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        # Version is read from `packageManager` in package.json (pinned to pnpm@10.33.0).
        # Do NOT add `with: version:` — pnpm/action-setup@v5 rejects the run with
        # "Multiple versions of pnpm specified" when both sources are set.
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Print toolchain versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        # `pnpm install --frozen-lockfile` is lenient about unbuilt native deps,
        # but some workspaces (better-sqlite3, esbuild) need their postinstall
        # scripts run for typecheck / tests to work. `pnpm rebuild` re-runs
        # them against the already-resolved versions.
        run: pnpm rebuild

      - name: Migration lock (hand-written preserve-blocks in drizzle/*.sql)
        # Runs BEFORE lint so a drift in an architecturally-locked block
        # (e.g. drizzle-kit regenerated 0001 and wiped the vec0 virtual
        # table) surfaces before any other signal. Produces a diffable
        # failure naming file, marker, expected sha256, and remediation
        # command (see packages/db/scripts/check-migration-lock.mjs).
        run: pnpm --filter @coodra/db run check:migration-lock

      - name: Build workspace packages in dep order (required for tests)
        # On a clean CI checkout, none of the workspace dist/ trees exist.
        # The verify job needs them populated before lint/typecheck/test:
        #
        #   - shared/db/policy: web-v2's next build resolves imports via
        #     each package's `exports` map, which points into dist/.
        #   - cli (tsc-only): web-v2 imports `@coodra/cli/lib/*` subpaths
        #     that only exist after tsc emits them. We skip the bundle
        #     step here because the bundle copies apps/web-v2/.next/
        #     standalone, which doesn't exist yet on a clean checkout.
        #   - web-v2: produces .next/standalone/ which the next step
        #     consumes.
        #   - cli (full build): now that web-v2's standalone exists, the
        #     full cli build's bundle.mjs picks it up and writes
        #     dist/runtime/web/. cli's services.test.ts asserts this path
        #     resolves via `resolveRuntimeBinary`.
        #
        # ~90s wall clock the first time; turbo caches subsequent runs.
        run: |
          pnpm --filter @coodra/shared build
          pnpm --filter @coodra/db build
          pnpm --filter @coodra/policy build
          pnpm --filter @coodra/cli build:tsc-only
          pnpm --filter @coodra/web-v2 build
          pnpm --filter @coodra/cli build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

  integration:
    name: postgres migrations (integration)
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: coodra
          POSTGRES_PASSWORD: coodra_ci_password
          POSTGRES_DB: coodra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coodra -d coodra"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://coodra:coodra_ci_password@127.0.0.1:5432/coodra
      REDIS_URL: redis://127.0.0.1:6379/0
      COODRA_MODE: team
      # Solo-bypass sentinel: keeps `config/env.ts` `superRefine` happy
      # under COODRA_MODE=team without supplying real Clerk creds.
      # The sentinel is recognised by `auth.ts` and routes auth into
      # the bypass path. Real keys are loaded from a local `.env` (gitignored).
      # Required so test files that import `config/env.ts` (S16's
      # `transports/http.test.ts`) can trigger the module's eager parse.
      CLERK_SECRET_KEY: sk_test_replace_me
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        # Version is read from `packageManager` in package.json (pinned to pnpm@10.33.0).
        # Do NOT add `with: version:` — pnpm/action-setup@v5 rejects the run with
        # "Multiple versions of pnpm specified" when both sources are set.
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        run: pnpm rebuild

      - name: Build @coodra/* in dependency order
        # `shared` first (db + policy depend on it transitively); `db`
        # next (its dist/migrate.js is consumed by both apps' auto-migrate
        # at boot); `policy` next; `cli build:tsc-only` emits cli lib
        # subpaths that mcp-server + hooks-bridge tsc need; then their
        # builds; then web-v2 next build (produces .next/standalone);
        # finally `cli build` (full, with bundle) so cli integration
        # tests like cold-install + npm-pack-lock + doctor-binary see
        # dist/runtime/{mcp-server,hooks-bridge,sync-daemon,web} present.
        run: |
          pnpm --filter @coodra/shared build
          pnpm --filter @coodra/db build
          pnpm --filter @coodra/policy build
          pnpm --filter @coodra/cli build:tsc-only
          pnpm --filter @coodra/mcp-server build
          pnpm --filter @coodra/hooks-bridge build
          pnpm --filter @coodra/web-v2 build
          pnpm --filter @coodra/cli build

      - name: Integration tests (Postgres migrations + hooks-bridge auth chain + mcp-server boot)
        # `--concurrency=1` is load-bearing: each workspace's integration
        # suite owns the shared CI Postgres exclusively for its run (the
        # tests DROP / re-migrate the public schema in `beforeAll`). With
        # default parallelism turbo would race apps/sync-daemon and apps/
        # mcp-server against each other and one would wipe the other's
        # tables mid-test. Cross-workspace test isolation via per-suite
        # schemas / databases is the proper long-term fix; for now,
        # serializing the integration step is the surgical, correct call.
        run: pnpm exec turbo run test:integration --concurrency=1

  hook-adapter-smoke:
    name: hook-adapter shell scripts (windsurf + cursor)
    runs-on: ${{ matrix.os }}
    needs: verify
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run hook-adapter smoke test
        # Spawns a Python mock bridge, pipes fixture payloads into
        # each adapter, asserts exit codes (0 / 2 / 0-fail-open).
        # Only requires bash + curl + python3 — no Node, no pnpm.
        run: bash scripts/hook-adapters/__tests__/smoke.sh

  windows-core-smoke:
    name: windows core (Claude Code) install smoke
    # Proves the Core (Claude Code) install path works on Windows x64
    # (2026-06-16): native deps install, `coodra init` wires .mcp.json +
    # the Claude Code hooks, and `coodra start` brings up the mcp-server +
    # hooks-bridge daemons (sqlite-vec-windows-x64 + better-sqlite3 prebuild
    # load, SQLite migrates, HTTP /healthz binds). The `web` dashboard and
    # the Cursor/Windsurf shell hook adapters are deliberately out of scope.
    runs-on: windows-latest
    needs: verify
    timeout-minutes: 25
    # Use Git Bash for every step so `set -e` / multi-line semantics match the
    # Linux jobs — PowerShell does NOT fail a multi-line step on a mid-block
    # native-command non-zero exit, which would mask a broken build.
    defaults:
      run:
        shell: bash
    env:
      COODRA_MODE: solo
      CLERK_SECRET_KEY: sk_test_replace_me
      LOG_LEVEL: error
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Print toolchain versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        # Fetches the win32-x64 prebuilt binaries: better-sqlite3 (node-ABI
        # prebuild via prebuild-install) + sqlite-vec-windows-x64 (the .dll
        # loadable extension). If either prebuild is missing for the runner's
        # Node ABI this step fails loud — exactly the signal we want.
        run: pnpm rebuild

      - name: Build the core in dependency order (no web — Core scope)
        # `cli build`'s bundle.mjs soft-skips the web standalone (absent here)
        # and produces dist/index.js + dist/runtime/{mcp-server,hooks-bridge,
        # sync-daemon} + dist/runtime/drizzle — everything the smoke needs.
        # The Windows-specific CLI logic (coodra-home, daemon selection,
        # web-skip) is unit-tested cross-platform via `platform` overrides on
        # the `verify` job, so this job's authoritative signal is the live
        # end-to-end smoke below rather than re-running the unit suite here.
        run: |
          pnpm --filter @coodra/shared build
          pnpm --filter @coodra/db build
          pnpm --filter @coodra/policy build
          pnpm --filter @coodra/cli build

      - name: Core install smoke (init → start → /healthz → status → stop)
        # The decisive Windows proof. The smoke sets COODRA_REQUIRE_VEC=1, so
        # the mcp-server boots ONLY if BOTH native deps loaded (better-sqlite3
        # prebuild + sqlite-vec-windows-x64 .dll); a /healthz 200 then means
        # the SQLite DB migrated and the HTTP server bound on Windows.
        run: pnpm --filter @coodra/cli smoke:core

  e2e:
    name: end-to-end (manifest + transport + idempotency + full session)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [verify, integration]
    env:
      COODRA_MODE: solo
      CLERK_SECRET_KEY: sk_test_replace_me
      LOG_LEVEL: error
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        run: pnpm rebuild

      - name: Build @coodra/* in dependency order (required by e2e imports)
        # All packages have `main: ./dist/index.js` and `exports`
        # pointing into dist. The e2e tests import them as
        # workspace:* deps; without the build, vitest can't resolve
        # the entry points. Module 03 S14 will spawn hooks-bridge as
        # a subprocess for the full-session lifecycle test, so include
        # its dist here too — keeps each slice self-contained.
        # `cli build:tsc-only` is required before mcp-server /
        # hooks-bridge because both import `@coodra/cli/lib/*` subpaths.
        run: |
          pnpm --filter @coodra/shared build
          pnpm --filter @coodra/db build
          pnpm --filter @coodra/policy build
          pnpm --filter @coodra/cli build:tsc-only
          pnpm --filter @coodra/mcp-server build
          pnpm --filter @coodra/hooks-bridge build

      # `testcontainers` needs a Docker daemon. GitHub-hosted ubuntu
      # runners ship Docker pre-installed; just verify it before the
      # tests pull pgvector/pgvector:pg16.
      - name: Verify Docker daemon
        run: docker info

      - name: E2E tests (5 scenarios, 24 tests; testcontainers + subprocess)
        run: pnpm test:e2e
